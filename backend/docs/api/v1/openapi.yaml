components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token issued by the HMS auth module.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Tenant-scoped API key for integration-facing HMS routes.
  headers:
    ETag:
      description: Entity tag used for conditional GET and replay-safe caching.
      schema:
        type: string
    LastModified:
      description: RFC 7231 last modified timestamp for conditional requests.
      schema:
        type: string
        format: date-time
    CacheControl:
      description: Cache classification emitted by the offline middleware.
      schema:
        type: string
    XOfflinePolicy:
      description: Resolved offline/cache policy for the route family.
      schema:
        type: string
        enum:
          - no-store
          - revalidate
          - sync
  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      description: Preferred locale. Runtime currently resolves all supported requests to the `en` backend locale, with `en-GB` mapped explicitly to `en`.
      schema:
        type: string
        example: en-GB
    IfNoneMatch:
      name: If-None-Match
      in: header
      description: Conditional GET validator.
      schema:
        type: string
    IfModifiedSince:
      name: If-Modified-Since
      in: header
      description: Conditional GET timestamp validator.
      schema:
        type: string
        format: date-time
    IfMatch:
      name: If-Match
      in: header
      description: Required for conditional mutations on selected safety-critical resources.
      schema:
        type: string
    XResourceVersion:
      name: X-Resource-Version
      in: header
      description: Optional explicit resource version header validated alongside `If-Match` for safety-critical mutations.
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: Replay-safe key for supported mutation requests.
      schema:
        type: string
    Page:
      name: page
      in: query
      description: Pagination page number.
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Pagination size.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    SortBy:
      name: sort_by
      in: query
      description: Sort field selector.
      schema:
        type: string
    Order:
      name: order
      in: query
      description: Sort order.
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    Since:
      name: since
      in: query
      description: Incremental sync cursor timestamp for route families with offline sync support.
      schema:
        type: string
        format: date-time
    Search:
      name: search
      in: query
      description: Text search query used by modules that expose search-capable list endpoints.
      schema:
        type: string
  responses:
    UnauthorizedProblem:
      description: Authentication is required or the token is invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ForbiddenProblem:
      description: The caller is authenticated but not authorized for the requested action.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFoundProblem:
      description: The requested resource was not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ConflictProblem:
      description: The request conflicts with current server state or a duplicate uniqueness constraint.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    PreconditionProblem:
      description: A required conditional mutation header is missing or inconsistent.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationProblem:
      description: Validation failed for path, query, header, or body input.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalProblem:
      description: Unexpected server failure.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
        request_id:
          type: string
        locale:
          type: string
      additionalProperties: true
    Meta:
      type: object
      properties:
        locale:
          type: string
          example: en
        direction:
          type: string
          example: ltr
        timestamp:
          type: string
          format: date-time
      additionalProperties: true
    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean
      additionalProperties: true
    SyncMetadata:
      type: object
      properties:
        sync_token:
          type: string
        has_more:
          type: boolean
        timestamp:
          type: string
          format: date-time
      additionalProperties: true
    ResourceEnvelope:
      type: object
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        meta:
          $ref: '#/components/schemas/Meta'
      additionalProperties: true
    PaginatedEnvelope:
      type: object
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        pagination:
          $ref: '#/components/schemas/Pagination'
        sync:
          $ref: '#/components/schemas/SyncMetadata'
        meta:
          $ref: '#/components/schemas/Meta'
      additionalProperties: true
    GenericRecord:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
          nullable: true
        facility_id:
          type: string
          nullable: true
        branch_id:
          type: string
          nullable: true
        version:
          type: integer
          nullable: true
        etag:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true
    GenericMutationRequest:
      type: object
      additionalProperties: true
    AuthActionRequest:
      type: object
      description: Generic auth request payload. Concrete auth flows validate route-specific fields in runtime schemas.
      additionalProperties: true
    AuthContext:
      type: object
      properties:
        user:
          type: object
          additionalProperties: true
        roles:
          type: array
          items:
            type: string
        permissions:
