paths:
  /health:
    get:
      tags:
        - System
      summary: Health check
      description: Public readiness of the application shell and core dependencies.
      operationId: get_health
      security: []
      responses:
        '200':
          description: Successful response envelope.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            X-Offline-Policy:
              $ref: '#/components/headers/XOfflinePolicy'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HealthStatus'
        '503':
          $ref: '#/components/responses/InternalProblem'
      x-offline-policy: no-store
  /ready:
    get:
      tags:
        - System
      summary: Readiness check
      description: Public readiness signal for orchestrators and deployment automation.
      operationId: get_ready
      security: []
      responses:
        '200':
          description: Successful response envelope.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            X-Offline-Policy:
              $ref: '#/components/headers/XOfflinePolicy'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HealthStatus'
        '503':
          $ref: '#/components/responses/InternalProblem'
      x-offline-policy: no-store
  /live:
    get:
      tags:
        - System
      summary: Liveness check
      description: Public liveness probe for runtime availability.
      operationId: get_live
      security: []
      responses:
        '200':
          description: Successful response envelope.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            X-Offline-Policy:
              $ref: '#/components/headers/XOfflinePolicy'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HealthStatus'
        '503':
          $ref: '#/components/responses/InternalProblem'
      x-offline-policy: no-store
  /api/v1/abac-policies:
    get:
      tags:
        - ABAC Policies
      summary: List ABAC Policies
      description: |-
        Attribute-based access control policy administration layered on top of canonical RBAC.

        Offline policy: `no-store`.
      operationId: get_api_v1_abac_policies
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/IfNoneMatch'
        - $ref: '#/components/parameters/IfModifiedSince'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Since'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Successful response envelope.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            X-Offline-Policy:
              $ref: '#/components/headers/XOfflinePolicy'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AbacPolicy'
        '401':
          $ref: '#/components/responses/UnauthorizedProblem'
        '403':
          $ref: '#/components/responses/ForbiddenProblem'
        '422':
          $ref: '#/components/responses/ValidationProblem'
        '500':
          $ref: '#/components/responses/InternalProblem'
      x-route-family: abac-policies
      x-offline-policy: no-store
      x-route-source: src/modules/abac-policy/routes/abac-policy.routes.js
    post:
      tags:
        - ABAC Policies
      summary: Create ABAC Policy
      description: |-
        Attribute-based access control policy administration layered on top of canonical RBAC.

        Offline policy: `no-store`.
      operationId: post_api_v1_abac_policies
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: Successful response envelope.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            X-Offline-Policy:
              $ref: '#/components/headers/XOfflinePolicy'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResourceEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/AbacPolicy'
        '401':
          $ref: '#/components/responses/UnauthorizedProblem'
        '403':
          $ref: '#/components/responses/ForbiddenProblem'
        '409':
          $ref: '#/components/responses/ConflictProblem'
        '422':
          $ref: '#/components/responses/ValidationProblem'
        '500':
          $ref: '#/components/responses/InternalProblem'
      x-route-family: abac-policies
      x-offline-policy: no-store
      x-route-source: src/modules/abac-policy/routes/abac-policy.routes.js
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbacPolicyWriteRequest'
  /api/v1/abac-policies/{id}:
    get:
      tags:
        - ABAC Policies
      summary: Get ABAC Policy
      description: |-
        Attribute-based access control policy administration layered on top of canonical RBAC.

        Offline policy: `no-store`.
      operationId: get_api_v1_abac_policies_id
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/IfNoneMatch'
        - $ref: '#/components/parameters/IfModifiedSince'
        - name: id
          in: path
          required: true
          description: Id identifier.
          schema:
            type: string
      responses:
        '200':
          description: Successful response envelope.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            X-Offline-Policy:
              $ref: '#/components/headers/XOfflinePolicy'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResourceEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/AbacPolicy'
        '401':
          $ref: '#/components/responses/UnauthorizedProblem'
        '403':
          $ref: '#/components/responses/ForbiddenProblem'
        '404':
          $ref: '#/components/responses/NotFoundProblem'
        '422':
          $ref: '#/components/responses/ValidationProblem'
        '500':
          $ref: '#/components/responses/InternalProblem'
