name: flutter_template
description: Reusable Flutter foundation for multi-platform apps.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  connectivity_plus: ^7.1.1
  dio: ^5.9.2
  drift: 2.28.2
  drift_flutter: 0.2.5
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_riverpod: 3.0.3
  flutter_secure_storage: ^10.2.0
  go_router: ^17.2.3
  intl: ^0.20.2
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.7.1
  custom_lint: 0.8.1
  drift_dev: 2.28.2
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.5
  riverpod_lint: 3.0.3

flutter:
  generate: true
  uses-material-design: true
